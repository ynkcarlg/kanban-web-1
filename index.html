<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Pro - WEB I</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Meu Quadro Kanban</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="O que precisa ser feito?">
            <button onclick="addNewTask()">Adicionar</button>
        </div>
    </header>

    <main class="kanban-board">
        <section class="column" id="todo" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>A Fazer</h2>
            <div class="cards-container"></div>
        </section>

        <section class="column" id="doing" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>Fazendo</h2>
            <div class="cards-container"></div>
        </section>

        <section class="column" id="done" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>Concluído</h2>
            <div class="cards-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
